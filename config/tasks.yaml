scheduler:
  tick_interval_seconds: 15
  max_concurrent_tasks: 2
retry_policy:
  max_retries: 2
  backoff_seconds: 3
task_defaults:
  timeout_seconds: 120
  priority: normal
heartbeat:
  enabled: true
  interval_minutes: 60
email_store:
  enabled: true
  max_entries: 5000
  retention_days: 90
  warmup_hours: 168
