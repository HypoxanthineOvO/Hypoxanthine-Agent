auth_token: dev-token-change-me
directory_whitelist:
  read:
    - ./docs
    - ./config
    - ./memory
    - ./src
    - ./tests
  write:
    - ./memory/sessions
    - ./memory/knowledge
    - ./logs
  execute:
    - ./workflows
circuit_breaker:
  tool_level_max_failures: 3
  session_level_max_failures: 5
  cooldown_seconds: 120
  global_kill_switch: false
