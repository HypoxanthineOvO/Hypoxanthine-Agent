auth_token: dev-token-change-me
directory_whitelist:
  rules:
    - path: ${HYPO_AGENT_ROOT}
      permissions:
        - read
    - path: ${HYPO_AGENT_ROOT}/config
      permissions:
        - read
        - write
    - path: ${HYPO_AGENT_ROOT}/memory
      permissions:
        - read
        - write
    - path: ${HYPO_AGENT_ROOT}/logs
      permissions:
        - read
        - write
    - path: ${HYPO_AGENT_ROOT}/workflows
      permissions:
        - read
        - execute
  default_policy: readonly
  blocked_paths:
    - /etc/passwd
    - /etc/shadow
    - /etc/sudoers
    - /etc/gshadow
    - ~/.ssh
    - ~/.gnupg
    - ~/.bash_history
    - ~/.zsh_history
    - ~/.python_history
    - /root
circuit_breaker:
  tool_level_max_failures: 5
  session_level_max_failures: 10
  cooldown_seconds: 120
  global_kill_switch: false
