default_model: MimoV25Flash

task_routing:
  chat: MimoV25Flash
  reasoning: MimoV25Pro
  heartbeat: MimoV25Flash
  lightweight: MimoV25Flash
  compression: MimoV25Flash
  embedding: VolcanoEmbedding
  vision: MimoV2Omni
  audio: MimoV25TTS
  tts: MimoV25TTS

models:
  MimoV25Flash:
    litellm_model: "openai/mimo-v2.5"
    provider: "MimoTokenPlan"
    supports_tool_calling: true
    description: "MiMo V2.5 Flash via Xiaomi Token Plan"
    fallback: DeepSeekV4
    reasoning_config:
      chat: low
      lightweight: low
      compression: low
      reasoning: medium
  MimoV25Pro:
    litellm_model: "openai/mimo-v2.5-pro"
    provider: "MimoTokenPlan"
    supports_tool_calling: true
    description: "MiMo V2.5 Pro via Xiaomi Token Plan"
    fallback: MimoV25Flash
    reasoning_config:
      chat: medium
      reasoning: high
  MimoV2Pro:
    litellm_model: "openai/mimo-v2-pro"
    provider: "MimoTokenPlan"
    supports_tool_calling: true
    description: "MiMo V2 Pro via Xiaomi Token Plan"
    fallback: MimoV25Flash
    reasoning_config:
      chat: medium
      reasoning: high
  MimoV2Omni:
    type: vision
    litellm_model: "openai/mimo-v2-omni"
    provider: "MimoTokenPlan"
    supports_tool_calling: true
    description: "MiMo V2 Omni vision via Xiaomi Token Plan; primary low-latency image understanding route"
    fallback: DashscopeQwenVLPlus
  DashscopeQwenVLPlus:
    type: vision
    litellm_model: "openai/qwen-vl-plus-latest"
    provider: "Dashscope"
    supports_tool_calling: true
    description: "Qwen VL Plus latest via DashScope; fast non-Mimo vision fallback"
    fallback: DashscopeQwen3VLFlash
  DashscopeQwen3VLFlash:
    type: vision
    litellm_model: "openai/qwen3-vl-flash"
    provider: "Dashscope"
    supports_tool_calling: true
    description: "Qwen3 VL Flash via DashScope; second fast non-Mimo vision fallback"
    fallback: MimoV25VisionFlash
  MimoV25VisionFlash:
    type: vision
    litellm_model: "openai/mimo-v2.5"
    provider: "MimoTokenPlan"
    supports_tool_calling: true
    description: "MiMo V2.5 Flash vision-capable fallback via Xiaomi Token Plan"
    fallback: null
  MimoV25TTS:
    type: audio
    litellm_model: "openai/mimo-v2.5-tts"
    provider: "MimoTokenPlan"
    description: "MiMo V2.5 TTS via Xiaomi Token Plan"
    fallback: MimoV2TTS
  MimoV25TTSVoiceClone:
    type: audio
    litellm_model: "openai/mimo-v2.5-tts-voiceclone"
    provider: "MimoTokenPlan"
    description: "MiMo V2.5 TTS VoiceClone via Xiaomi Token Plan"
    fallback: MimoV25TTS
  MimoV25TTSVoiceDesign:
    type: audio
    litellm_model: "openai/mimo-v2.5-tts-voicedesign"
    provider: "MimoTokenPlan"
    description: "MiMo V2.5 TTS VoiceDesign via Xiaomi Token Plan"
    fallback: MimoV25TTS
  MimoV2TTS:
    type: audio
    litellm_model: "openai/mimo-v2-tts"
    provider: "MimoTokenPlan"
    description: "MiMo V2 TTS via Xiaomi Token Plan"
    fallback: null
  GPT:
    litellm_model: "openai/gpt-5.4"
    provider: "VSPLab"
    supports_tool_calling: true
    description: "OpenAI ChatGPT"
    fallback: GPTMini
    reasoning_config:
      chat: low
      reasoning: high
  GPTMini:
    litellm_model: "openai/gpt-5.4-mini"
    provider: "VSPLab"
    supports_tool_calling: true
    description: "OpenAI ChatGPT"
    fallback: CodingPlanAuto
  DeepSeekV4:
    litellm_model: "deepseek/deepseek-v4-flash"
    provider: Deepseek
    supports_tool_calling: true
    description: "Deepseek V4 Flash"
    fallback: GPT
    reasoning_config:
      chat: low
      reasoning: high
  DeepSeekV4Pro:
    litellm_model: "deepseek/deepseek-v4-pro"
    provider: Deepseek
    supports_tool_calling: true
    description: "Deepseek V4 Pro"
    fallback: DeepSeekV4
    reasoning_config:
      chat: low
      reasoning: high

  GenesiQWen35BA3B:
    litellm_model: "openai/qwen3.6-35b"
    provider: "GenesisLocal"
    supports_tool_calling: true
    description: "Local Qwen 3.6 35B-A3B via VLLM"
    fallback: null
    reasoning_config:
      chat: low
      reasoning: high

  CodingPlanAuto:
    litellm_model: "openai/ark-code-latest"
    provider: "volcengine_coding"
    supports_tool_calling: true
    description: "Ark Code Latest via 火山引擎 Coding Plan (Auto mode)"
    fallback: null

  VolcanoEmbedding:
    type: embedding
    provider: "volcano"
    litellm_model: "openai/ep-20250904174839-hhslf"
    description: "Volcano / Ark embedding model for L3 semantic memory"
    fallback: null

  EdenQwen:
    provider: "Eden"
    litellm_model: "ollama_chat/qwen3.5:27b"
    supports_tool_calling: true
    description: "Eden Ollama - Qwen3.5 27B"
    fallback: CodingPlanAuto

  EdenGemma:
    provider: "Eden"
    litellm_model: "ollama_chat/gemma4:31b"   # 用 ollama_chat/ 前缀
    supports_tool_calling: true
    description: "Eden Ollama - Gemma 4 31B"
    fallback: CodingPlanAuto
