default_model: GPT

task_routing:
  chat: GPT
  reasoning: GPT
  heartbeat: EdenQwen
  lightweight: EdenQwen
  compression: EdenQwen
  embedding: VolcanoEmbedding
  vision: GPT

models:
  GPT:
    litellm_model: "openai/gpt-5.4"
    provider: "TTAPI"
    supports_tool_calling: true
    description: "OpenAI ChatGPT"
    fallback: CodingPlanAuto
    reasoning_config:
      chat: low
      reasoning: high

  GenesisQwen122B:
    litellm_model: "openai/qwen3.5-122b"
    provider: "Genesis"
    supports_tool_calling: true
    description: "Genesis local Qwen3.5 122B"
    fallback: CodingPlanAuto
    reasoning_config:
      chat: low
      reasoning: high

  CodingPlanAuto:
    litellm_model: "openai/ark-code-latest"
    provider: "volcengine_coding"
    supports_tool_calling: true
    description: "Ark Code Latest via 火山引擎 Coding Plan (Auto mode)"
    fallback: null

  VolcanoEmbedding:
    type: embedding
    provider: "volcano"
    litellm_model: "openai/ep-20250904174839-hhslf"
    description: "Volcano / Ark embedding model for L3 semantic memory"
    fallback: null

  EdenQwen:
    provider: "Eden"
    litellm_model: "ollama_chat/qwen3.5:27b"
    supports_tool_calling: true
    description: "Eden Ollama - Qwen3.5 27B"
    fallback: CodingPlanAuto

  EdenGemma:
    provider: "Eden"
    litellm_model: "ollama_chat/gemma4:31b"   # 用 ollama_chat/ 前缀
    supports_tool_calling: true
    description: "Eden Ollama - Gemma 4 31B"
    fallback: CodingPlanAuto
