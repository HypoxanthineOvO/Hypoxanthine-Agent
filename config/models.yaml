default_model: KimiK25

task_routing:
  chat: GPT
  lightweight: GLM47Coding
  embedding: VolcanoEmbedding
  vision: GPT

models:
  GPT:
    litellm_model: "openai/gpt-5.4"
    provider: "TTAPI"
    supports_tool_calling: true
    description: "OpenAI ChatGPT"
    fallback: KimiK25

  KimiK25:
    litellm_model: "openai/kimi-k2.5"
    provider: "volcengine_coding"
    supports_tool_calling: true
    description: "Kimi K2.5 via 火山引擎 Coding Plan (OpenAI compat)"
    fallback: DeepseekV3_2_Core

  GLM47Coding:
    litellm_model: "openai/glm-4.7"
    provider: "volcengine_coding"
    supports_tool_calling: true
    description: "GLM-4.7 via 火山引擎 Coding Plan (OpenAI compat)"
    fallback: KimiK25

  Gemini3Pro:
    provider: Hiapi
    # NOTE(M4 diagnose): 2026-03-04 tool-calling probe returned tool_calls=null
    # on this provider endpoint. Keep config unchanged, but re-check provider
    # compatibility before relying on function calling in production.
    litellm_model: "openai/gemini-3-pro"
    fallback: DeepseekV3_2


  DeepseekV3_2_Core:
    provider: "volcengine_coding"
    litellm_model: "openai/deepseek-v3.2"
    description: "DeepSeek V3.2 via 火山方舟 Coding Plan (fallback terminal)"
    fallback: null


  VolcanoEmbedding:
    type: embedding
    provider: "volcano"
    litellm_model: "openai/ep-20250904174839-hhslf"
    description: "Volcano / Ark embedding model for L3 semantic memory"
    fallback: null
