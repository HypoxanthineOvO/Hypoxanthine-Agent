cycle:
  number: 1
  name: "新 Cycle"
strategy: "evidence_first_serial_refactor"
recommended_route: "先总体架构审计和探针，再按证据重构。"
milestones:
  - id: M1
    prompt: ".pipeline/prompts/001-architecture-first-principles-audit.md"
    name: "总体架构审判"
    objective: "从第一性原理审查当前系统的抽象、边界、状态模型、错误恢复、可观测性和测试闭环。"
    kind: analysis
    validation: "证据表、故障路径图、设计缺陷清单。"
  - id: M2
    prompt: ".pipeline/prompts/002-resource-reference-resolution.md"
    name: "资源引用统一模型"
    objective: "建立文件、附件、URL、网页、导出物的统一 ResourceRef/ResourceResolver。"
    kind: refactor
    validation: "本地文件、上传文件、模糊文件名、URL 场景测试。"
  - id: M3
    prompt: ".pipeline/prompts/003-tool-contract-recovery-loop.md"
    name: "工具调用契约与恢复循环"
    objective: "在工具调用前后加入参数校验、补全、歧义追问、失败分型、重试和替代路径。"
    kind: refactor
    validation: "工具调用回放、缺参/错参/歧义注入测试。"
  - id: M4
    prompt: ".pipeline/prompts/004-webpage-reading-architecture.md"
    name: "网页阅读架构重做"
    objective: "构建 HTTP reader、浏览器渲染、cookie/session、fallback、错误分型的网页读取链路。"
    kind: refactor
    validation: "普通网页、知乎、动态页面、登录态 smoke。"
  - id: M5
    prompt: ".pipeline/prompts/005-channel-file-delivery.md"
    name: "渠道文件能力"
    objective: "统一 outbound attachment contract，并补齐 QQ/微信/飞书文件发送适配和能力声明。"
    kind: refactor
    validation: "本机模拟和可用时真实渠道验收。"
  - id: M6
    prompt: ".pipeline/prompts/006-agent-active-recovery-state-machine.md"
    name: "Agent 主动性状态机"
    objective: "让 Agent 在 search/ask/retry/verify 状态中主动解决歧义、失败和不确定性。"
    kind: refactor
    validation: "找文件、读网页、修参数、确认结果的失败恢复场景。"
  - id: M7
    prompt: ".pipeline/prompts/007-frontend-backend-contract-observability.md"
    name: "前后端契约与可观测性"
    objective: "整理 API/WebSocket contract，补齐 WebUI 候选确认、工具状态、错误恢复和 trace 可视化。"
    kind: refactor
    validation: "API 契约测试、Playwright、长任务状态测试。"
  - id: M8
    prompt: ".pipeline/prompts/008-tiered-testing-release-acceptance.md"
    name: "分级测试与上线验收"
    objective: "建立功能性测试和真实场景验收分层矩阵，形成上线闸门。"
    kind: validation
    validation: "全量测试与本机近真实 E2E 验收包。"
